<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="description" content="Corvid field observation logger — behavioral signal recorder for ravens, crows, and corvids">
<title>CorvidObs</title>
<link rel="manifest" href="/Raven/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300;1,500&display=swap" rel="stylesheet">

<style>
/* ── TOKENS ──────────────────────────────────────────────────────────────── */
:root {
  --black:    #0a0a0a;
  --deep:     #111208;
  --surface:  #161610;
  --lift:     #1e1e16;
  --border:   #2a2a1e;
  --muted:    #4a4a38;
  --text:     #d8d4c0;
  --text-dim: #7a7660;
  --gold:     #c8a84b;
  --gold-dim: #7a6628;
  --amber:    #d4824a;
  --warn:     #c87040;
  --white:    #f0ece0;

  --font-mono: 'Space Mono', monospace;
  --font-serif: 'Cormorant Garamond', Georgia, serif;

  --radius:   6px;
  --radius-lg: 12px;
}

/* ── RESET ───────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--black);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  user-select: none;
  -webkit-user-select: none;
}

button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
textarea { font-family: inherit; color: inherit; }

/* ── APP SHELL ───────────────────────────────────────────────────────────── */
#app {
  width: 100%;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.screen {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── SETUP SCREEN ────────────────────────────────────────────────────────── */
.setup-screen {
  overflow-y: auto;
  background: var(--deep);
  padding: 0 0 40px;
}

.setup-header {
  padding: 40px 24px 28px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
  position: relative;
  background: linear-gradient(180deg, #0f0f08 0%, var(--deep) 100%);
}

.logo-mark {
  width: 52px;
  height: 52px;
  margin: 0 auto 16px;
}

.logo-mark.small {
  width: 36px;
  height: 36px;
  margin: 0 auto 12px;
}

.logo-svg { width: 100%; height: 100%; }

.app-title {
  font-family: var(--font-serif);
  font-size: 32px;
  font-weight: 500;
  letter-spacing: 0.15em;
  color: var(--white);
  font-style: italic;
}

.title-obs {
  font-style: normal;
  font-weight: 300;
  color: var(--gold);
  letter-spacing: 0.25em;
}

.app-sub {
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-top: 6px;
}

.setup-form {
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.field-group { display: flex; flex-direction: column; gap: 10px; }

.field-label {
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.species-selector,
.count-selector,
.dist-selector,
.mode-toggle {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.species-btn, .count-btn, .dist-btn, .mode-btn {
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--text-dim);
  background: var(--surface);
  transition: all 0.15s;
  letter-spacing: 0.05em;
}

.species-btn.active,
.count-btn.active,
.dist-btn.active,
.mode-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(200, 168, 75, 0.08);
}

.mode-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 12px;
}

.mode-hint {
  font-size: 10px;
  opacity: 0.6;
  font-style: italic;
}

.notes-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  font-size: 13px;
  color: var(--text);
  resize: none;
  height: 80px;
  width: 100%;
  outline: none;
  line-height: 1.5;
}

.notes-input:focus { border-color: var(--muted); }
.notes-input::placeholder { color: var(--muted); }

.begin-btn {
  margin: 32px 20px 0;
  padding: 18px;
  background: var(--gold);
  color: var(--black);
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: opacity 0.15s;
}

.begin-btn:active { opacity: 0.8; }

/* ── SESSION SCREEN ──────────────────────────────────────────────────────── */
.session-screen {
  background: var(--black);
  display: grid;
  grid-template-rows: auto auto auto auto 1fr auto;
  overflow: hidden;
}

.session-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}

.session-meta {
  display: flex;
  align-items: center;
  gap: 16px;
}

.session-species {
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--gold);
  font-style: italic;
  font-family: var(--font-serif);
}

.session-timer {
  font-size: 13px;
  color: var(--text-dim);
  font-family: var(--font-mono);
}

.session-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

.ctrl-btn {
  padding: 6px 10px;
  font-size: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-dim);
  background: var(--lift);
}

.end-btn {
  border-color: var(--amber);
  color: var(--amber);
  letter-spacing: 0.1em;
  font-size: 11px;
}

/* ── VIEWFINDER ──────────────────────────────────────────────────────────── */
.viewfinder-wrap {
  position: relative;
  width: 100%;
  height: 180px;
  background: #050505;
  overflow: hidden;
  flex-shrink: 0;
}

.camera-feed {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.92;
}

.vf-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.vf-corner {
  position: absolute;
  width: 20px;
  height: 20px;
  border-color: var(--gold);
  border-style: solid;
  opacity: 0.6;
}
.vf-corner.tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
.vf-corner.tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
.vf-corner.bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
.vf-corner.br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

.signal-flash {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(200,168,75,0.9);
  color: var(--black);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  white-space: nowrap;
  animation: flashIn 0.2s ease;
}

@keyframes flashIn {
  from { opacity: 0; transform: translateX(-50%) scale(0.9); }
  to   { opacity: 1; transform: translateX(-50%) scale(1); }
}

/* ── AUDIO ───────────────────────────────────────────────────────────────── */
.audio-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.audio-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  letter-spacing: 0.3em;
  color: var(--text-dim);
  white-space: nowrap;
}

.rec-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--amber);
  animation: pulse 1.5s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.waveform {
  flex: 1;
  height: 36px;
  border-radius: 3px;
}

/* ── CATEGORY TABS ───────────────────────────────────────────────────────── */
.cat-tabs {
  display: flex;
  overflow-x: auto;
  gap: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  scrollbar-width: none;
}

.cat-tabs::-webkit-scrollbar { display: none; }

.cat-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 14px;
  flex-shrink: 0;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  color: var(--text-dim);
}

.cat-tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
  background: rgba(200,168,75,0.05);
}

.cat-icon {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cat-icon svg { width: 100%; height: 100%; }

.cat-label {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ── SIGNAL GRID ─────────────────────────────────────────────────────────── */
.signal-grid {
  overflow-y: auto;
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  align-content: start;
  scrollbar-width: thin;
  scrollbar-color: var(--muted) transparent;
}

.signal-card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 12px 12px;
  text-align: left;
  transition: all 0.12s;
  min-height: 56px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.signal-card:active,
.signal-card.tapped {
  background: rgba(200,168,75,0.12);
  border-color: var(--gold);
  transform: scale(0.97);
}

.sig-plain {
  font-size: 12px;
  color: var(--text);
  line-height: 1.35;
  font-family: var(--font-mono);
}

.sig-tech {
  font-size: 9px;
  color: var(--text-dim);
  font-style: italic;
  letter-spacing: 0.03em;
}

.sig-caveat-dot {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 11px;
  color: var(--warn);
  opacity: 0.8;
}

/* ── EVENT STRIP ─────────────────────────────────────────────────────────── */
.event-strip {
  display: flex;
  flex-direction: column;
  gap: 0;
  overflow-y: auto;
  max-height: 90px;
  border-top: 1px solid var(--border);
  background: var(--deep);
  flex-shrink: 0;
  scrollbar-width: none;
}

.event-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px;
  border-bottom: 1px solid rgba(42,42,30,0.5);
  transition: background 0.3s;
}

.event-pill.new { background: rgba(200,168,75,0.06); }

.ev-time {
  font-size: 10px;
  color: var(--gold-dim);
  font-family: var(--font-mono);
  flex-shrink: 0;
  width: 36px;
}

.ev-plain {
  font-size: 11px;
  color: var(--text-dim);
  flex: 1;
}

.ev-warn { font-size: 10px; color: var(--warn); }

/* ── CAVEAT TOAST ────────────────────────────────────────────────────────── */
.caveat-toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  max-width: 320px;
  width: calc(100% - 40px);
  background: var(--lift);
  border: 1px solid var(--warn);
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: 11px;
  color: var(--text);
  line-height: 1.5;
  z-index: 999;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}

.caveat-toast.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.caveat-warn {
  color: var(--warn);
  margin-right: 6px;
}

/* ── REVIEW SCREEN ───────────────────────────────────────────────────────── */
.review-screen {
  overflow-y: auto;
  background: var(--deep);
  padding: 0 0 40px;
}

.review-header {
  padding: 36px 24px 24px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}

.review-title {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 300;
  font-style: italic;
  color: var(--white);
  letter-spacing: 0.05em;
}

.review-sub {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  margin-top: 6px;
}

.review-stats {
  display: flex;
  justify-content: space-around;
  padding: 0 20px 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}

.stat-block { text-align: center; }

.stat-num {
  font-family: var(--font-serif);
  font-size: 32px;
  font-weight: 300;
  color: var(--gold);
}

.stat-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: 4px;
}

.review-section {
  padding: 0 20px 24px;
}

.review-sec-title {
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.top-signal {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}

.top-tech { font-size: 11px; color: var(--text); font-family: var(--font-mono); }
.top-count { font-size: 11px; color: var(--gold); }

.review-detail {
  font-size: 11px;
  color: var(--text-dim);
  font-family: var(--font-mono);
}

.event-log {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  max-height: 320px;
  overflow-y: auto;
}

.log-row {
  display: grid;
  grid-template-columns: 44px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
}

.log-row.has-caveat { background: rgba(200,112,64,0.04); }
.log-row:last-child { border-bottom: none; }

.log-time { color: var(--gold-dim); font-family: var(--font-mono); font-size: 10px; }
.log-plain { color: var(--text); }
.log-tech { color: var(--text-dim); font-size: 9px; text-align: right; font-style: italic; }

.review-actions {
  display: flex;
  gap: 12px;
  padding: 0 20px;
  margin-top: 8px;
}

.export-btn, .new-btn {
  flex: 1;
  padding: 16px;
  border-radius: var(--radius);
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 700;
  transition: opacity 0.15s;
}

.export-btn {
  background: var(--surface);
  border: 1px solid var(--gold);
  color: var(--gold);
}

.new-btn {
  background: var(--gold);
  color: var(--black);
}

.export-btn:active, .new-btn:active { opacity: 0.8; }

/* ── SCROLLBAR ───────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }
</style>
</head>
<body>
<div id="app"></div>
<script src="/app.js"></script>
</body>
</html>
